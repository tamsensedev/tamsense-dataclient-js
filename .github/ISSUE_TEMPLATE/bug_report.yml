name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SDK version
      placeholder: "0.1.5"
    validations:
      required: true
  - type: dropdown
    id: framework
    attributes:
      label: Framework
      options:
        - React
        - Next.js
        - Vue
        - Nuxt
        - Angular
        - Vanilla JS
        - Other
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: "Chrome 125, Safari 18, etc."
